name: docs-ci

on:
  pull_request:
    branches:
      - main
    paths:
      - README.md
      - CHANGELOG.md
      - docs/**
      - scripts/check-*.sh
      - .github/workflows/**
  push:
    branches:
      - main
      - feature/**
      - fix/**
    paths:
      - README.md
      - CHANGELOG.md
      - docs/**
      - scripts/check-*.sh
      - .github/workflows/**

permissions:
  contents: read

concurrency:
  group: docs-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate changelog and documentation policy
        env:
          GOVERNANCE_DOCS_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          GOVERNANCE_DOCS_HEAD_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: ./scripts/check-governance-docs.sh

      - name: Run governance range regression checks
        run: ./scripts/check-governance-docs-test.sh

      - name: Validate documentation coverage indexes
        run: ./scripts/check-docs-index.sh
