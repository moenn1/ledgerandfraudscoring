name: release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Version label to use for manual artifact bundles
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    env:
      WORKFLOW_RELEASE_VERSION: ${{ github.event.inputs.release_version || '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Resolve release metadata
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_version="${GITHUB_REF_NAME}"
          elif [[ -n "${WORKFLOW_RELEASE_VERSION}" ]]; then
            release_version="${WORKFLOW_RELEASE_VERSION}"
          else
            release_version="manual-${GITHUB_RUN_NUMBER}"
          fi
          echo "RELEASE_VERSION=${release_version}" >> "${GITHUB_ENV}"

      - name: Package backend artifact
        working-directory: backend
        run: mvn -B -DskipTests package

      - name: Allocate smoke port
        run: |
          port="$(python3 - <<'PY'
          import socket

          with socket.socket() as sock:
              sock.bind(("127.0.0.1", 0))
              print(sock.getsockname()[1])
          PY
          )"
          echo "PORT=${port}" >> "${GITHUB_ENV}"
          echo "API_BASE_URL=http://127.0.0.1:${port}" >> "${GITHUB_ENV}"

      - name: Start backend
        run: |
          mkdir -p "${RUNNER_TEMP}/ledgerforge-release-smoke"
          nohup java -jar backend/target/*.jar > "${RUNNER_TEMP}/ledgerforge-release-smoke/backend.log" 2>&1 &
          echo $! > "${RUNNER_TEMP}/ledgerforge-release-smoke/backend.pid"

      - name: Run release smoke gate
        run: ./scripts/demo-run.sh

      - name: Upload release smoke log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-smoke-backend-log
          path: ${{ runner.temp }}/ledgerforge-release-smoke/backend.log
          if-no-files-found: ignore

      - name: Print release smoke log on failure
        if: failure()
        run: cat "${RUNNER_TEMP}/ledgerforge-release-smoke/backend.log"

      - name: Stop backend
        if: always()
        run: |
          if [[ -f "${RUNNER_TEMP}/ledgerforge-release-smoke/backend.pid" ]]; then
            kill "$(cat "${RUNNER_TEMP}/ledgerforge-release-smoke/backend.pid")" || true
          fi

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-fund --no-audit

      - name: Build frontend bundle
        working-directory: frontend
        run: npm run build

      - name: Assemble release artifacts
        run: |
          mkdir -p artifacts
          cp backend/target/*.jar "artifacts/ledgerforge-backend-${RELEASE_VERSION}.jar"
          tar -czf "artifacts/ledgerforge-operator-console-${RELEASE_VERSION}.tar.gz" -C frontend dist
          (
            cd artifacts
            sha256sum * > SHA256SUMS.txt
          )

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ledgerforge-release-artifacts
          path: artifacts/*
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-artifacts
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: ledgerforge-release-artifacts
          path: artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: LedgerForge ${{ github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
