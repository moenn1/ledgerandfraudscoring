name: backend-ci

on:
  pull_request:
    branches:
      - main
    paths:
      - backend/**
      - scripts/**
      - .github/workflows/backend-ci.yml
      - .github/workflows/smoke-demo.yml
  push:
    branches:
      - main
      - feature/**
      - fix/**
    paths:
      - backend/**
      - scripts/**
      - .github/workflows/backend-ci.yml
      - .github/workflows/smoke-demo.yml

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-and-package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend tests
        run: mvn -B test

      - name: Upload backend test reports
        if: failure() && hashFiles('backend/target/surefire-reports/*') != ''
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/target/surefire-reports/*
          if-no-files-found: ignore

      - name: Package backend artifact
        run: mvn -B -DskipTests package
