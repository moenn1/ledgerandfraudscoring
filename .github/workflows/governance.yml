name: governance

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - feature/**
      - fix/**

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate changelog and documentation updates
        run: ./scripts/check-governance-docs.sh
