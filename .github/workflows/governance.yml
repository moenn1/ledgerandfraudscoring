name: governance

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - feature/**
      - fix/**

permissions:
  contents: read

concurrency:
  group: governance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate changelog and documentation updates
        env:
          GOVERNANCE_DOCS_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          GOVERNANCE_DOCS_HEAD_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: ./scripts/check-governance-docs.sh
