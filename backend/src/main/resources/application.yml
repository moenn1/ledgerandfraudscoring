spring:
  application:
    name: ledgerforge-payments-backend
  datasource:
    url: ${DB_URL:jdbc:h2:mem:ledgerforge;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${PORT:8080}

ledgerforge:
  security:
    oauth2:
      issuer-uri: ${LEDGERFORGE_AUTH_ISSUER_URI:}
      jwk-set-uri: ${LEDGERFORGE_AUTH_JWK_SET_URI:}
      issuer: ${LEDGERFORGE_AUTH_ISSUER:https://auth.ledgerforge.local}
      audience: ${LEDGERFORGE_AUTH_AUDIENCE:ledgerforge-operator-api}
      hmac-secret: ${LEDGERFORGE_AUTH_HMAC_SECRET:ledgerforge-dev-operator-signing-secret-change-before-shared-envs}
    cors:
      allowed-origins:
        - ${LEDGERFORGE_ALLOWED_ORIGIN_PRIMARY:http://127.0.0.1:5173}
        - ${LEDGERFORGE_ALLOWED_ORIGIN_SECONDARY:http://localhost:5173}
        - ${LEDGERFORGE_ALLOWED_ORIGIN_TERTIARY:http://127.0.0.1:3000}
        - ${LEDGERFORGE_ALLOWED_ORIGIN_QUATERNARY:http://localhost:3000}
