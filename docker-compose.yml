services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ledgerforge
      POSTGRES_USER: ledgerforge
      POSTGRES_PASSWORD: ledgerforge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerforge -d ledgerforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    profiles: ["platform"]
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: bitnami/kafka:3.7
    profiles: ["platform"]
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CFG_NUM_PARTITIONS: 1
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"
        ]
      interval: 10s
      timeout: 10s
      retries: 12

  zipkin:
    image: openzipkin/zipkin:3
    profiles: ["platform"]
    ports:
      - "9411:9411"

  prometheus:
    image: prom/prometheus:v2.53.0
    profiles: ["platform"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    profiles: ["auth"]
    command:
      - start-dev
      - --import-realm
      - --http-port=8080
    environment:
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ./deploy/keycloak/realm-ledgerforge.json:/opt/keycloak/data/import/realm-ledgerforge.json:ro

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy: ${no_proxy:-}
    profiles: ["full"]
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_URL: jdbc:postgresql://postgres:5432/ledgerforge
      DB_USER: ledgerforge
      DB_PASSWORD: ledgerforge
      LEDGERFORGE_KAFKA_ENABLED: "true"
      LEDGERFORGE_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      LEDGERFORGE_ALLOWED_ORIGIN_PRIMARY: http://127.0.0.1:4173
      LEDGERFORGE_ALLOWED_ORIGIN_SECONDARY: http://localhost:4173
      LEDGERFORGE_AUTH_HMAC_SECRET: ${LEDGERFORGE_AUTH_HMAC_SECRET:-ledgerforge-dev-operator-signing-secret-change-before-shared-envs}
      LEDGERFORGE_AUTH_ISSUER: ${LEDGERFORGE_AUTH_ISSUER:-https://auth.ledgerforge.local}
      LEDGERFORGE_AUTH_AUDIENCE: ${LEDGERFORGE_AUTH_AUDIENCE:-ledgerforge-operator-api}
      LEDGERFORGE_AUTH_JWK_SET_URI: ${LEDGERFORGE_AUTH_JWK_SET_URI:-}
      LEDGERFORGE_DATA_PROTECTION_KEY: ${LEDGERFORGE_DATA_PROTECTION_KEY:-ledgerforge-dev-data-protection-key-change-before-shared-envs}
      LEDGERFORGE_TRACING_ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      LEDGERFORGE_TRACING_SAMPLING_PROBABILITY: "1.0"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy: ${no_proxy:-}
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-}
        npm_config_registry: ${npm_config_registry:-}
    profiles: ["full"]
    environment:
      LEDGERFORGE_API_BASE_URL: ${LEDGERFORGE_API_BASE_URL:-http://127.0.0.1:8080}
      LEDGERFORGE_OPERATOR_BEARER_TOKEN: ${LEDGERFORGE_OPERATOR_BEARER_TOKEN:-}
    depends_on:
      - backend
    ports:
      - "4173:80"

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  prometheus-data:
